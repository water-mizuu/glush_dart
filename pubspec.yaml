name: glush
description: A versatile parser toolkit for Dart - generates parsers, supports context-free grammars, scannerless, streamable push-based API.
version: 2.0.0
homepage: https://github.com/judofyr/glush

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies: { meta: ^1.18.2 }
dev_dependencies:
  benchmark_harness: ^2.2.0
  crypto: ^3.0.0
  lints: ^6.1.0
  path: ^1.9.0
  test: ^1.24.0
